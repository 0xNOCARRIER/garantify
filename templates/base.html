<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Garantify{% endblock %}</title>

  <!-- Anti-flash : applique dark AVANT le rendu, fallback sur préférence OS -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>

  <!-- Design system Garantify -->
  <link rel="stylesheet" href="/static/css/theme.css">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen">
  {% block content %}{% endblock %}

  <!-- Bouton toggle thème -->
  <button id="theme-toggle"
    class="fixed bottom-5 right-5 z-50 g-btn g-btn-secondary !p-2.5 !rounded-full"
    title="Changer de thème">
    <span class="dark:hidden text-lg leading-none">🌙</span>
    <span class="hidden dark:inline text-lg leading-none">☀️</span>
  </button>

  <script>
    // Toggle manuel + sync avec OS si aucune préférence stockée
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var h = document.documentElement;
      var isDark = h.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Suit les changements de préférence OS en temps réel (si pas de choix manuel)
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('theme')) {
        document.documentElement.classList.toggle('dark', e.matches);
      }
    });
  </script>
</body>
</html>
