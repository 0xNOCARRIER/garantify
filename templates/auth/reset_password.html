{% extends "base.html" %}

{% block title %}Nouveau mot de passe — Garantify{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-6">
      <a href="/login" class="g-wordmark" style="font-size: 2rem;">Garantify</a>
    </div>

    <div class="g-card g-card-accent p-8">
      <h1 class="text-lg font-bold mb-6" style="color: var(--text-primary);">Nouveau mot de passe</h1>

      {% if let Some(err) = error %}
      <div class="g-alert g-alert-error mb-5">{{ err }}</div>
      {% endif %}

      {% if token.is_empty() %}
      <p class="text-center g-text-muted text-sm">
        <a href="/password/forgot">Demander un nouveau lien</a>
      </p>
      {% else %}

      <form method="post" action="/password/reset" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div>
          <label for="password" class="g-label">
            Nouveau mot de passe
            <span class="g-text-muted font-normal">(8 car. min.)</span>
          </label>
          <input id="password" type="password" name="password" required autocomplete="new-password"
            class="g-input" placeholder="••••••••">
        </div>

        <div>
          <label for="password_confirm" class="g-label">Confirmer</label>
          <input id="password_confirm" type="password" name="password_confirm" required autocomplete="new-password"
            class="g-input" placeholder="••••••••">
        </div>

        <button type="submit" class="g-btn g-btn-primary w-full justify-center">
          Réinitialiser →
        </button>
      </form>

      {% endif %}
    </div>

  </div>
</div>
{% endblock %}
