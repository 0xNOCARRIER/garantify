{% extends "base.html" %}

{% block title %}Créer un compte — Garantify{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-6">
      <a href="/" class="g-wordmark" style="font-size: 2rem;">Garantify</a>
      <p class="text-sm g-text-muted mt-2">Créez votre espace de suivi</p>
    </div>

    <div class="g-card g-card-accent p-8">
      <h1 class="text-lg font-bold mb-6" style="color: var(--text-primary);">Créer un compte</h1>

      {% if let Some(err) = error %}
      <div class="g-alert g-alert-error mb-5">{{ err }}</div>
      {% endif %}

      <form method="post" action="/register" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div>
          <label for="email" class="g-label">Email</label>
          <input id="email" type="email" name="email" required autocomplete="email"
            class="g-input" placeholder="vous@exemple.com">
        </div>

        <div>
          <label for="password" class="g-label">
            Mot de passe
            <span class="g-text-muted font-normal">(8 car. min.)</span>
          </label>
          <input id="password" type="password" name="password" required autocomplete="new-password"
            class="g-input" placeholder="••••••••">
        </div>

        <div>
          <label for="password_confirm" class="g-label">Confirmer le mot de passe</label>
          <input id="password_confirm" type="password" name="password_confirm" required autocomplete="new-password"
            class="g-input" placeholder="••••••••">
        </div>

        <button type="submit" class="g-btn g-btn-primary w-full justify-center mt-2">
          Créer mon compte →
        </button>
      </form>

      <hr class="g-divider my-5">

      <div class="text-sm text-center g-text-muted">
        Déjà un compte ? <a href="/login" style="color: var(--accent-primary); font-weight: 600;">Se connecter</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
