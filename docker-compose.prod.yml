# ---------------------------------------------------------------
# Production deployment — uses the pre-built image from GHCR.
# For local development with a source build, use docker-compose.yml.
# Usage: docker compose -f docker-compose.prod.yml up -d
# Update: docker compose -f docker-compose.prod.yml pull && up -d
# Pin a version: IMAGE_TAG=1.2.3 docker compose -f docker-compose.prod.yml up -d
# ---------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garantify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-garantify}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - garantify-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garantify} -d ${POSTGRES_DB:-garantify}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ghcr.io/0xnocarrier/garantify:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-garantify}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-garantify}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - uploads:/data/uploads
    networks:
      - garantify-net
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  uploads:

networks:
  garantify-net:
